name: socail-media Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/socail-media-backend

            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 20

            git pull origin main
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            npx pm2 restart socail-media-backend || pm2 start dist/server.js --name socail-media-backend